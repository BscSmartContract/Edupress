name: Android APK Build

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 10

  - name: Get pnpm store path
    id: pnpm-store
    run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

  - name: Cache pnpm store
    uses: actions/cache@v4
    with:
      path: ${{ steps.pnpm-store.outputs.dir }}
      key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      restore-keys: pnpm-${{ runner.os }}-

  - name: Install workspace dependencies
    run: pnpm install --frozen-lockfile

  - name: Build workspace libs
    run: pnpm run typecheck:libs

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Cache Gradle wrapper
    uses: actions/cache@v4
    with:
      path: ~/.gradle/wrapper
      key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
      restore-keys: gradle-wrapper-${{ runner.os }}-

  - name: Cache Gradle caches
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/configuration-cache
      key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**') }}
      restore-keys: gradle-caches-${{ runner.os }}-

  - name: Cache Expo prebuild
    id: prebuild-cache
    uses: actions/cache@v4
    with:
      path: artifacts/mobile-app/android
      key: expo-prebuild-v3-${{ runner.os }}-${{ hashFiles('artifacts/mobile-app/app.json', 'artifacts/mobile-app/package.json') }}
      restore-keys: expo-prebuild-v3-${{ runner.os }}-

  - name: Prebuild Android
    working-directory: artifacts/mobile-app
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
    run: |
      if [ "${{ steps.prebuild-cache.outputs.cache-hit }}" = "true" ]; then
        echo "Prebuild cache hit — skipping regeneration"
      else
        npx expo prebuild --platform android --clean
      fi

  - name: Build APK
    working-directory: artifacts/mobile-app/android
    run: |
      ./gradlew assembleDebug \
        --build-cache \
        --parallel \
        --no-daemon

  - name: Find APK
    working-directory: artifacts/mobile-app/android
    run: |
      echo "=== APK FILES ==="
      find app/build -type f -name "*.apk"

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: edupress-debug-apk
      path: artifacts/mobile-app/android/app/build/outputs/apk/debug/*.apk
      if-no-files-found: error
      retention-days: 7
