name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── Cache 1: pnpm package store ─────────────────────────────────────────
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libs
        run: pnpm run typecheck:libs

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Cache 2: Gradle wrapper binary ──────────────────────────────────────
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-${{ runner.os }}-

      # ── Cache 3: Gradle dependency & build caches ───────────────────────────
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**') }}
          restore-keys: gradle-caches-${{ runner.os }}-

      # ── Cache 4: Expo prebuild output (android/ directory) ──────────────────
      # v3 busts the old cache that was created with a different dependency set.
      - name: Cache Expo prebuild
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: artifacts/mobile-app/android
          key: expo-prebuild-v3-${{ runner.os }}-${{ hashFiles('artifacts/mobile-app/app.json', 'artifacts/mobile-app/package.json') }}
          restore-keys: expo-prebuild-v3-${{ runner.os }}-

      - name: Prebuild Android
        working-directory: artifacts/mobile-app
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          if [ "${{ steps.prebuild-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Prebuild cache hit — skipping regeneration"
          else
            npx expo prebuild --platform android --clean
          fi

      # ── Build debug APK ──────────────────────────────────────────────────────
      # assembleDebug uses automatic debug keystore signing — no keytool needed.
      # arm64-v8a only: covers ~99 % of modern Android devices and cuts
      # build time by ~3-4 min vs building all four ABI slices.
      # NOTE: --configuration-cache is intentionally omitted — React Native's
      # Gradle scripts invoke Node at configuration time, which that flag forbids.
      - name: Build APK
        working-directory: artifacts/mobile-app/android
        run: |
          ./gradlew assembleDebug \
            --build-cache \
            --parallel \
            --no-daemon \
            -Pandroid.injected.build.abi=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edupress-debug-arm64
          path: artifacts/mobile-app/android/app/build/outputs/apk/debug/
          retention-days: 7
