name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── Cache 1: pnpm package store ─────────────────────────────────────────
      # Saves ~2-4 min: avoids re-downloading all npm packages on every run.
      # Key is the full lockfile hash so any dependency change busts the cache.
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace libs
        run: pnpm run typecheck:libs

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Cache 2: Gradle wrapper binary ──────────────────────────────────────
      # Saves ~1 min: avoids re-downloading the Gradle distribution zip.
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-${{ runner.os }}-

      # ── Cache 3: Gradle dependency & build caches ───────────────────────────
      # Saves ~3-6 min: avoids re-downloading Android build tools, AGP, and
      # all transitive Maven dependencies on every run.
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**') }}
          restore-keys: gradle-caches-${{ runner.os }}-

      # ── Cache 4: Expo prebuild output (android/ directory) ──────────────────
      # Saves ~1 min: skips native project regeneration when app.json and
      # package.json haven't changed.  If the cache hits we skip --clean so
      # Gradle's incremental build can also do less work.
      - name: Cache Expo prebuild
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: artifacts/mobile-app/android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('artifacts/mobile-app/app.json', 'artifacts/mobile-app/package.json') }}
          restore-keys: expo-prebuild-${{ runner.os }}-

      - name: Prebuild Android
        working-directory: artifacts/mobile-app
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          if [ "${{ steps.prebuild-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Prebuild cache hit — skipping regeneration"
          else
            npx expo prebuild --platform android --clean
          fi

      # ── Build APK ────────────────────────────────────────────────────────────
      # --build-cache  reuses task outputs from previous Gradle runs.
      # --parallel     compiles independent modules concurrently.
      # --no-daemon    avoids leaving a background process on the runner.
      # -Pandroid.injected.build.abi=arm64-v8a
      #   Builds only the ARM64 slice (covers ~99% of modern Android devices).
      #   This cuts the APK from ~194 MB → ~40 MB and skips 3 CMake compilation
      #   passes (armeabi-v7a, x86, x86_64), saving ~3-4 min of build time.
      #   NOTE: --configuration-cache is intentionally omitted — React Native's
      #   Gradle scripts call external `node` processes at configuration time,
      #   which Gradle's configuration cache forbids.
      # ── Ensure debug keystore exists (used to sign the release APK) ─────────
      # Using the standard Android debug keystore lets anyone install the APK
      # without setting up a production signing config.
      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build APK
        working-directory: artifacts/mobile-app/android
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --no-daemon \
            -Pandroid.injected.build.abi=arm64-v8a \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edupress-release-arm64
          path: artifacts/mobile-app/android/app/build/outputs/apk/release/
          retention-days: 7
