name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: artifacts/mobile-app
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo CLI
        run: npm install -g expo-cli eas-cli

      - name: Prebuild Android
        working-directory: artifacts/mobile-app
        run: npx expo prebuild --clean

      - name: Build APK
        working-directory: artifacts/mobile-app/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: artifacts/mobile-app/android/app/build/outputs/apk/debug/

