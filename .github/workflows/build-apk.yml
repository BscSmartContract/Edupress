name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (local Gradle, no EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Generate native Android project
        working-directory: artifacts/mobile-app
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Make Gradlew executable
        working-directory: artifacts/mobile-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/mobile-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduPress-debug-apk
          path: artifacts/mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
